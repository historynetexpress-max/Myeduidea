<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>हिंदी क्विज़ ऐप</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B35;
    --deep: #1A0A2E;
    --purple: #4A0E8F;
    --gold: #FFD700;
    --mint: #00F5A0;
    --pink: #FF3CAC;
    --card: #240D4A;
    --text: #F0E6FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', cursive;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(74,14,143,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,245,160,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
    animation: slideDown 0.6s ease;
  }

  .header h1 {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    background: linear-gradient(135deg, var(--gold), var(--saffron), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    text-shadow: none;
  }

  .header .subtitle {
    font-size: 1rem;
    color: rgba(240,230,255,0.6);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Score Bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 16px;
    padding: 16px 24px;
    margin: 20px 0;
    animation: fadeIn 0.5s ease;
  }

  .score-item {
    text-align: center;
  }

  .score-item .label {
    font-size: 0.75rem;
    color: rgba(240,230,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-item .value {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .progress-bar {
    flex: 1;
    margin: 0 20px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mint), var(--gold));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Category Selection */
  .screen {
    display: none;
    animation: fadeIn 0.4s ease;
  }

  .screen.active { display: block; }

  .screen-title {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 1.8rem;
    text-align: center;
    margin-bottom: 24px;
    color: var(--text);
  }

  .categories {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 30px;
  }

  .cat-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .cat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cat-card:nth-child(1)::before { background: linear-gradient(135deg, rgba(255,107,53,0.3), transparent); }
  .cat-card:nth-child(2)::before { background: linear-gradient(135deg, rgba(0,245,160,0.3), transparent); }
  .cat-card:nth-child(3)::before { background: linear-gradient(135deg, rgba(255,60,172,0.3), transparent); }
  .cat-card:nth-child(4)::before { background: linear-gradient(135deg, rgba(255,215,0,0.3), transparent); }
  .cat-card:nth-child(5)::before { background: linear-gradient(135deg, rgba(74,14,143,0.5), transparent); }
  .cat-card:nth-child(6)::before { background: linear-gradient(135deg, rgba(100,200,255,0.3), transparent); }

  .cat-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,215,0,0.4);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .cat-card:hover::before { opacity: 1; }

  .cat-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
  .cat-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .cat-count { font-size: 0.8rem; color: rgba(240,230,255,0.5); margin-top: 4px; }

  /* Question Card */
  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .question-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--saffron), var(--pink), var(--mint));
  }

  .q-number {
    font-size: 0.85rem;
    color: rgba(240,230,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .q-text {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 8px;
  }

  .q-category {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    color: var(--gold);
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 0.8rem;
    margin-top: 8px;
  }

  /* Options */
  .options {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 1.05rem;
    color: var(--text);
    width: 100%;
  }

  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(255,215,0,0.1);
    border-color: rgba(255,215,0,0.4);
    transform: translateX(6px);
  }

  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--gold);
    color: var(--deep);
  }

  .option-btn.correct {
    background: rgba(0,245,160,0.15);
    border-color: var(--mint);
    color: var(--mint);
  }

  .option-btn.correct .option-letter {
    background: var(--mint);
    color: var(--deep);
  }

  .option-btn.wrong {
    background: rgba(255,60,172,0.15);
    border-color: var(--pink);
    color: var(--pink);
    opacity: 0.7;
  }

  .option-btn.wrong .option-letter {
    background: var(--pink);
    color: white;
  }

  .option-btn:disabled { cursor: not-allowed; }

  /* Feedback */
  .feedback {
    text-align: center;
    padding: 16px;
    border-radius: 16px;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: none;
    animation: pop 0.3s ease;
  }

  .feedback.show { display: block; }
  .feedback.correct { background: rgba(0,245,160,0.15); color: var(--mint); }
  .feedback.wrong { background: rgba(255,60,172,0.15); color: var(--pink); }

  .explanation {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 0.95rem;
    color: rgba(240,230,255,0.7);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--pink));
    color: white;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,107,53,0.5);
  }

  .btn-secondary {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: var(--text);
    margin-top: 12px;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Result Screen */
  .result-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: conic-gradient(var(--gold) var(--pct, 0%), rgba(255,255,255,0.05) 0%);
    box-shadow: 0 0 40px rgba(255,215,0,0.3);
    position: relative;
  }

  .result-circle::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--deep);
  }

  .result-score {
    position: relative;
    z-index: 1;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .result-label {
    position: relative;
    z-index: 1;
    font-size: 0.8rem;
    color: rgba(240,230,255,0.5);
  }

  .result-title {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 8px;
  }

  .result-message {
    text-align: center;
    color: rgba(240,230,255,0.6);
    margin-bottom: 24px;
    font-size: 1rem;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-box {
    flex: 1;
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .stat-box .val { font-size: 1.8rem; font-weight: 800; }
  .stat-box .lbl { font-size: 0.75rem; color: rgba(240,230,255,0.5); margin-top: 2px; }
  .stat-correct .val { color: var(--mint); }
  .stat-wrong .val { color: var(--pink); }
  .stat-pct .val { color: var(--gold); }

  /* Animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    0% { transform: scale(0.95); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .shake { animation: shake 0.3s ease; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 2s ease-in forwards;
    z-index: 100;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Timer */
  .timer-ring {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }

  .timer {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: conic-gradient(var(--saffron) var(--t, 100%), rgba(255,255,255,0.1) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    position: relative;
  }

  .timer::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: var(--deep);
  }

  .timer span { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>हिंदी क्विज़</h1>
    <p class="subtitle">ज्ञान परखें • जीतें • आगे बढ़ें</p>
  </div>

  <!-- Score Bar -->
  <div class="score-bar" id="scoreBar" style="display:none">
    <div class="score-item">
      <div class="label">अंक</div>
      <div class="value" id="scoreVal">0</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="score-item">
      <div class="label">प्रश्न</div>
      <div class="value" id="qNumVal">1/10</div>
    </div>
  </div>

  <!-- Home Screen -->
  <div class="screen active" id="homeScreen">
    <div class="screen-title">श्रेणी चुनें</div>
    <div class="categories">
      <div class="cat-card" onclick="startQuiz('सामान्य ज्ञान')">
        <span class="cat-icon">🏛️</span>
        <div class="cat-name">सामान्य ज्ञान</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
      <div class="cat-card" onclick="startQuiz('इतिहास')">
        <span class="cat-icon">📜</span>
        <div class="cat-name">इतिहास</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
      <div class="cat-card" onclick="startQuiz('विज्ञान')">
        <span class="cat-icon">🔬</span>
        <div class="cat-name">विज्ञान</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
      <div class="cat-card" onclick="startQuiz('भूगोल')">
        <span class="cat-icon">🌍</span>
        <div class="cat-name">भूगोल</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
      <div class="cat-card" onclick="startQuiz('हिंदी साहित्य')">
        <span class="cat-icon">📖</span>
        <div class="cat-name">हिंदी साहित्य</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
      <div class="cat-card" onclick="startQuiz('खेलकूद')">
        <span class="cat-icon">🏏</span>
        <div class="cat-name">खेलकूद</div>
        <div class="cat-count">10 प्रश्न</div>
      </div>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div class="screen" id="quizScreen">
    <div class="timer-ring">
      <div class="timer" id="timerEl"><span id="timerNum">15</span></div>
    </div>

    <div class="question-card">
      <div class="q-number" id="qNumber">प्रश्न 1 / 10</div>
      <div class="q-text" id="qText"></div>
      <span class="q-category" id="qCat"></span>
    </div>

    <div class="options" id="optionsContainer"></div>

    <div class="feedback" id="feedback"></div>

    <button class="btn btn-primary" id="nextBtn" style="display:none" onclick="nextQuestion()">
      अगला प्रश्न →
    </button>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="resultScreen">
    <div class="result-circle" id="resultCircle">
      <div class="result-score" id="finalScore">0/10</div>
      <div class="result-label">अंक</div>
    </div>

    <div class="result-title" id="resultTitle">शाबाश! 🎉</div>
    <div class="result-message" id="resultMessage"></div>

    <div class="stats-row">
      <div class="stat-box stat-correct">
        <div class="val" id="correctCount">0</div>
        <div class="lbl">सही ✓</div>
      </div>
      <div class="stat-box stat-wrong">
        <div class="val" id="wrongCount">0</div>
        <div class="lbl">गलत ✗</div>
      </div>
      <div class="stat-box stat-pct">
        <div class="val" id="pctVal">0%</div>
        <div class="lbl">प्रतिशत</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="showHome()">फिर से खेलें 🔄</button>
    <button class="btn btn-secondary" onclick="showHome()">नई श्रेणी चुनें</button>
  </div>
</div>

<script>
const allQuestions = {
  'सामान्य ज्ञान': [
    { q: 'भारत का राष्ट्रीय पशु कौन सा है?', opts: ['शेर', 'बाघ', 'हाथी', 'मोर'], ans: 1, exp: 'बाघ (रॉयल बंगाल टाइगर) भारत का राष्ट्रीय पशु है।' },
    { q: 'भारत का राष्ट्रीय पक्षी कौन सा है?', opts: ['तोता', 'कबूतर', 'मोर', 'बाज'], ans: 2, exp: 'मोर भारत का राष्ट्रीय पक्षी है।' },
    { q: 'भारत की राजधानी क्या है?', opts: ['मुंबई', 'कोलकाता', 'चेन्नई', 'नई दिल्ली'], ans: 3, exp: 'नई दिल्ली भारत की राजधानी है।' },
    { q: 'भारत का राष्ट्रगान किसने लिखा?', opts: ['महात्मा गांधी', 'रवींद्रनाथ टैगोर', 'बंकिमचंद्र', 'सुभाष चंद्र बोस'], ans: 1, exp: 'जन गण मन रवींद्रनाथ टैगोर ने लिखा था।' },
    { q: 'भारत में कितने राज्य हैं?', opts: ['27', '28', '29', '36'], ans: 1, exp: 'वर्तमान में भारत में 28 राज्य हैं।' },
    { q: 'भारतीय रुपये का प्रतीक चिह्न किसने डिज़ाइन किया?', opts: ['D. उदय कुमार', 'नंदलाल बोस', 'सत्यजीत रे', 'आर.के. लक्ष्मण'], ans: 0, exp: 'D. उदय कुमार ने 2010 में ₹ का डिज़ाइन बनाया।' },
    { q: 'भारत का सबसे बड़ा राज्य (क्षेत्रफल) कौन सा है?', opts: ['उत्तर प्रदेश', 'मध्य प्रदेश', 'राजस्थान', 'महाराष्ट्र'], ans: 2, exp: 'राजस्थान क्षेत्रफल की दृष्टि से भारत का सबसे बड़ा राज्य है।' },
    { q: 'भारत का राष्ट्रीय फूल कौन सा है?', opts: ['गुलाब', 'कमल', 'चमेली', 'सूरजमुखी'], ans: 1, exp: 'कमल (Nelumbo nucifera) भारत का राष्ट्रीय फूल है।' },
    { q: '"सत्यमेव जयते" कहाँ से लिया गया है?', opts: ['ऋग्वेद', 'मुण्डकोपनिषद', 'भगवद्गीता', 'रामायण'], ans: 1, exp: 'यह वाक्य मुण्डकोपनिषद से लिया गया है।' },
    { q: 'भारत का राष्ट्रीय खेल कौन सा है?', opts: ['क्रिकेट', 'कबड्डी', 'हॉकी', 'कुश्ती'], ans: 2, exp: 'हॉकी भारत का राष्ट्रीय खेल है।' }
  ],

let currentCategory = '';
let questions = [];
let currentQ = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let timerInterval = null;
let timeLeft = 15;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  document.getElementById('scoreBar').style.display = 'none';
  clearInterval(timerInterval);
  showScreen('homeScreen');
}

function startQuiz(cat) {
  currentCategory = cat;
  questions = [...allQuestions[cat]].sort(() => Math.random() - 0.5);
  currentQ = 0;
  score = 0;
  correct = 0;
  wrong = 0;

  document.getElementById('scoreBar').style.display = 'flex';
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('progressFill').style.width = '0%';

  showScreen('quizScreen');
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById('qNumber').textContent = `प्रश्न ${currentQ + 1} / ${questions.length}`;
  document.getElementById('qNumVal').textContent = `${currentQ + 1}/${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCat').textContent = currentCategory;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['अ', 'ब', 'स', 'द'];

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 15;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
}

function updateTimerUI() {
  document.getElementById('timerNum').textContent = timeLeft;
  const pct = (timeLeft / 15) * 100;
  const color = timeLeft > 8 ? '#FF6B35' : timeLeft > 4 ? '#FFD700' : '#FF3CAC';
  document.getElementById('timerEl').style.background = 
    `conic-gradient(${color} ${pct}%, rgba(255,255,255,0.1) 0%)`;
}

function timeUp() {
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');

  wrong++;
  showFeedback(false, 'समय समाप्त! ⏰', q.exp);
}

function selectAnswer(idx) {
  clearInterval(timerInterval);
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.ans) {
    btns[idx].classList.add('correct');
    const pts = Math.max(10, timeLeft * 7);
    score += pts;
    correct++;
    document.getElementById('scoreVal').textContent = score;
    showFeedback(true, `सही! 🎉 +${pts} अंक`, q.exp);
    launchConfetti();
  } else {
    btns[idx].classList.add('wrong');
    btns[idx].classList.add('shake');
    btns[q.ans].classList.add('correct');
    wrong++;
    showFeedback(false, 'गलत! 😔', q.exp);
  }

  const progress = ((currentQ + 1) / questions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('nextBtn').textContent = 
    currentQ < questions.length - 1 ? 'अगला प्रश्न →' : 'परिणाम देखें 🏆';
}

function showFeedback(isCorrect, msg, exp) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = `<div>${msg}</div><div class="explanation">${exp}</div>`;
}

function nextQuestion() {
  currentQ++;
  if (currentQ < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('scoreBar').style.display = 'none';

  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('finalScore').textContent = `${score}`;
  document.getElementById('resultCircle').style.setProperty('--pct', pct + '%');
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('pctVal').textContent = pct + '%';

  let title, msg;
  if (pct >= 90) { title = 'अद्भुत! 🌟'; msg = 'आप विशेषज्ञ हैं! अपने मित्रों को चुनौती दें।'; launchConfetti(); launchConfetti(); }
  else if (pct >= 70) { title = 'बहुत अच्छे! 👏'; msg = 'शानदार प्रदर्शन! थोड़ी और मेहनत करें।'; launchConfetti(); }
  else if (pct >= 50) { title = 'ठीक है! 😊'; msg = 'अच्छा प्रयास! अभ्यास से और बेहतर होंगे।'; }
  else { title = 'कोशिश जारी रखें! 💪'; msg = 'हिम्मत मत हारो! दोबारा कोशिश करें।'; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMessage').textContent = msg;

  showScreen('resultScreen');
}

function launchConfetti() {
  const colors = ['#FF6B35', '#FFD700', '#00F5A0', '#FF3CAC', '#7B2FFF'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random() * 1.5}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}
</script>
