<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Simple Blog Publisher</title>
    <!-- Google Fonts for a nicer look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafc;
            color: #1e293b;
            line-height: 1.6;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #0f172a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subhead {
            color: #475569;
            margin-bottom: 2.5rem;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
        }

        /* Form card */
        .publish-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            margin-bottom: 3rem;
            border: 1px solid #e9eef2;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
            color: #1e293b;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #ffffff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #0f172a;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* posts grid */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
            transition: all 0.2s;
        }

        .post-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.1);
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: #0f172a;
            line-height: 1.3;
        }

        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 1.2rem;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 1rem;
        }

        .post-author {
            font-weight: 600;
            color: #334155;
        }

        .post-date {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .post-date::before {
            content: "📅";
            margin-right: 0.3rem;
        }

        .post-content {
            color: #334155;
            font-size: 1.1rem;
            white-space: pre-wrap;      /* keep line breaks */
            word-wrap: break-word;
        }

        .no-posts {
            text-align: center;
            padding: 3rem;
            background: #f1f5f9;
            border-radius: 32px;
            color: #475569;
            font-style: italic;
        }

        /* small delete button – optional */
        .delete-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: color 0.2s;
        }
        .delete-btn:hover {
            color: #dc2626;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✍️ Write & Publish</h1>
        <div class="subhead">Share your thoughts – they stay saved in your browser</div>

        <!-- Form to create new post -->
        <div class="publish-card">
            <form id="publishForm">
                <div class="form-group">
                    <label for="title">Article title</label>
                    <input type="text" id="title" placeholder="e.g. My journey into coding" required>
                </div>
                <div class="form-group">
                    <label for="author">Your name (optional)</label>
                    <input type="text" id="author" placeholder="Anonymous">
                </div>
                <div class="form-group">
                    <label for="content">Article content</label>
                    <textarea id="content" placeholder="Write your story ..." required></textarea>
                </div>
                <button type="submit" class="btn">📌 Publish article</button>
            </form>
        </div>

        <!-- All published posts will appear here -->
        <div id="postsContainer" class="posts-grid">
            <!-- dynamic content injected via JS -->
        </div>
        <footer>✨ your drafts live in local storage – they're yours only</footer>
    </div>

    <script>
        (function() {
            // --- constants & helpers ---
            const STORAGE_KEY = 'simple_blog_posts';
            const postsContainer = document.getElementById('postsContainer');
            const form = document.getElementById('publishForm');

            // load posts from localStorage or start with sample posts
            let posts = loadPosts();

            // --- initial render ---
            renderPosts();

            // --- handle form submit (publish new) ---
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // get form values
                const title = document.getElementById('title').value.trim();
                const author = document.getElementById('author').value.trim() || 'Anonymous';
                const content = document.getElementById('content').value.trim();

                if (!title || !content) {
                    alert('Please fill in title and content.');
                    return;
                }

                // create post object
                const newPost = {
                    id: Date.now().toString(),   // simple unique id
                    title: title,
                    author: author,
                    content: content,
                    date: new Date().toLocaleDateString('en-US', { 
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    })
                };

                // add to beginning (newest first)
                posts.unshift(newPost);
                savePosts(posts);
                renderPosts();

                // reset form (but keep author maybe)
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                // optional: keep author name as typed
            });

            // --- load from storage or use default dummy posts ---
            function loadPosts() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        return JSON.parse(stored);
                    } catch (e) {
                        console.error('Failed to parse stored posts', e);
                        return getDefaultPosts();
                    }
                } else {
                    return getDefaultPosts();
                }
            }

            function getDefaultPosts() {
                return [
                    {
                        id: '1',
                        title: 'Welcome to your blog!',
                        author: 'Admin',
                        content: 'This is a sample article to show you how posts will look. You can delete it or publish your own. Everything you write is saved in your browser (localStorage).',
                        date: 'Mar 15, 2025, 10:30 AM'
                    },
                    {
                        id: '2',
                        title: 'Why writing matters',
                        author: 'Jane Doe',
                        content: 'Writing down your thoughts helps you think clearer. This little tool lets you focus on content — no databases, no servers.',
                        date: 'Mar 14, 2025, 4:15 PM'
                    }
                ];
            }

            // --- save to localStorage ---
            function savePosts(postsArray) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(postsArray));
            }

            // --- render all posts into the container ---
            function renderPosts() {
                if (!postsContainer) return;

                if (posts.length === 0) {
                    postsContainer.innerHTML = `<div class="no-posts">🚀 No articles yet. Publish your first one above!</div>`;
                    return;
                }

                // build html
                let htmlString = '';
                posts.forEach(post => {
                    htmlString += `
                        <div class="post-card" data-id="${post.id}">
                            <div class="post-title">${escapeHTML(post.title)}</div>
                            <div class="post-meta">
                                <span class="post-author">✍️ ${escapeHTML(post.author)}</span>
                                <span class="post-date">${escapeHTML(post.date)}</span>
                            </div>
                            <div class="post-content">${escapeHTML(post.content).replace(/\n/g, '<br>')}</div>
                            <button class="delete-btn" onclick="deletePost('${post.id}')" title="Delete article">🗑️ delete</button>
                        </div>
                    `;
                });

                postsContainer.innerHTML = htmlString;
            }

            // --- simple escape to prevent XSS from user input ---
            function escapeHTML(str) {
                return str.replace(/[&<>"]/g, function(match) {
                    if (match === '&') return '&amp;';
                    if (match === '<') return '&lt;';
                    if (match === '>') return '&gt;';
                    if (match === '"') return '&quot;';
                    return match;
                });
            }

            // --- delete function (exposed globally because onclick attribute) ---
            window.deletePost = function(id) {
                if (confirm('Delete this article?')) {
                    posts = posts.filter(post => post.id !== id);
                    savePosts(posts);
                    renderPosts();
                }
            };

            // optional: if you want to clear all posts (uncomment for a "clear all" button)
            // but we don't have a button for that now.
        })();
    </script>
</body>
</html>
